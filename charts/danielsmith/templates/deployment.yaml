apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "danielsmith.fullname" . }}
  labels:
    {{- include "danielsmith.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "danielsmith.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- with .Values.podLabels }}
{{ toYaml . | nindent 8 }}
        {{- end }}
        {{- include "danielsmith.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "danielsmith.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "danielsmith.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
            - name: var-run
              mountPath: /var/run
            {{- if .Values.githubMetricsCache.enabled }}
            - name: github-metrics-cache
              mountPath: {{ include "danielsmith.githubMetricsPublicMountPath" . }}
              readOnly: true
            {{- end }}
          {{- if or (gt (len .Values.env) 0) (gt (len .Values.extraEnv) 0) }}
          env:
            {{- if kindIs "map" .Values.env }}
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- else }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.githubMetricsCache.enabled }}
        - name: github-metrics
          image: {{ include "danielsmith.githubMetricsImage" . | quote }}
          imagePullPolicy: {{ .Values.githubMetricsCache.image.pullPolicy }}
          command:
            - python
            - /scripts/refresh-github-metrics.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
            - name: PYTHONUNBUFFERED
              value: '1'
            - name: GITHUB_METRICS_OUTPUT_PATH
              value: {{ .Values.githubMetricsCache.outputPath | quote }}
            - name: GITHUB_METRICS_REPOS_PATH
              value: /config/repos.json
            - name: GITHUB_METRICS_REFRESH_INTERVAL_SECONDS
              value: {{ .Values.githubMetricsCache.refreshIntervalSeconds | quote }}
            - name: GITHUB_METRICS_STARTUP_TIMEOUT_SECONDS
              value: {{ .Values.githubMetricsCache.startupTimeoutSeconds | quote }}
            - name: GITHUB_METRICS_CACHE_TTL_SECONDS
              value: {{ .Values.githubMetricsCache.cacheTtlSeconds | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.githubMetricsCache.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: github-metrics-cache
              mountPath: {{ .Values.githubMetricsCache.outputPath | dir }}
            - name: github-metrics-config
              mountPath: /scripts/refresh-github-metrics.py
              subPath: refresh-github-metrics.py
              readOnly: true
            - name: github-metrics-config
              mountPath: /config/repos.json
              subPath: repos.json
              readOnly: true
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-cache-nginx
          emptyDir: {}
        - name: var-run
          emptyDir: {}
        {{- if .Values.githubMetricsCache.enabled }}
        - name: github-metrics-cache
          emptyDir: {}
        - name: github-metrics-config
          configMap:
            name: {{ include "danielsmith.fullname" . }}-github-metrics
            defaultMode: 0444
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
