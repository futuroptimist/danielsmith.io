replicaCount: 1

image:
  repository: ghcr.io/futuroptimist/danielsmith.io
  # Keep this non-empty so default `helm lint`/`helm template` work with a
  # tag published by CI. `main-latest` is only a local rendering/linting
  # convenience; Sugarkube staging/prod sign-off must override it with an
  # immutable `main-<shortsha>` tag or set image.digest.
  tag: main-latest
  digest: ''
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

githubMetricsCache:
  enabled: false
  image:
    repository: python
    tag: '3.12-alpine'
    pullPolicy: IfNotPresent
  refreshIntervalSeconds: 3600
  startupTimeoutSeconds: 20
  cacheTtlSeconds: 4500
  outputPath: /cache/github-metrics.json
  publicPath: /runtime/github-metrics.json
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
  repos:
    - owner: futuroptimist
      repo: danielsmith.io
    - owner: futuroptimist
      repo: token.place
    - owner: futuroptimist
      repo: gabriel
    - owner: futuroptimist
      repo: flywheel
    - owner: futuroptimist
      repo: jobbot3000
    - owner: futuroptimist
      repo: gitshelves
    - owner: futuroptimist
      repo: f2clipboard
    - owner: futuroptimist
      repo: sigma
    - owner: futuroptimist
      repo: wove
    - owner: futuroptimist
      repo: pr-reaper

probes:
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

env: []
extraEnv: []
envFrom: []

ingress:
  enabled: false
  className: ''
  annotations: {}
  host: ''
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ''

nodeSelector: {}
tolerations: []
affinity: {}
