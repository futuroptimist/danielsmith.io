server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","service":"danielsmith.io","check":"healthz"}';
    }

    location = /livez {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok","service":"danielsmith.io","check":"livez"}';
    }

    location = /resume.pdf {
        default_type application/pdf;
        try_files /resume.pdf =404;
    }

    location ~ /\.|/\. {
        return 404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* ^/runtime/.*\.json$ {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.map$ {
        return 404;
    }

    location ~* \.map$ {
        return 404;
    }

    location ~* ^/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.[^/]+$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @spa_fallback;
    }

    location @spa_fallback {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }
}
