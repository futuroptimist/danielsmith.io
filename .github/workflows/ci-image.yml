name: Build and publish GHCR image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to build
        required: false
        default: main

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      full_sha: ${{ steps.meta.outputs.full_sha }}
      created: ${{ steps.meta.outputs.created }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - name: Checkout triggering commit
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        shell: bash
        env:
          SELECTED_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          publish="false"
          selected_ref="${SELECTED_REF:-main}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish="true"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${selected_ref}" in
              ""|main|refs/heads/main)
                publish="true"
                ;;
            esac
          fi

          {
            echo "full_sha=${full_sha}"
            echo "short_sha=${short_sha}"
            echo "created=${created}"
            echo "publish=${publish}"
          } >> "$GITHUB_OUTPUT"

      - name: Build local smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: danielsmith-io:smoke
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.full_sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: Smoke test local image
        shell: bash
        run: |
          set -euo pipefail

          container_name="danielsmith-io-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker logs "${container_name}" || true
            docker rm -f "${container_name}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --name "${container_name}" \
            -p 127.0.0.1:8080:8080 \
            danielsmith-io:smoke

          ready=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null && \
              curl -fsS http://127.0.0.1:8080/healthz >/dev/null && \
              curl -fsS http://127.0.0.1:8080/livez >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          test "${ready}" = 1

          studio_html="$(curl -fsS http://127.0.0.1:8080/studio)"
          grep -qi '<html' <<< "${studio_html}"

          asset_path="$(docker exec "${container_name}" sh -lc \
            "sed -n 's/.*\(\/assets\/[^\" ]*\).*/\1/p' /usr/share/nginx/html/index.html \
            | head -n 1")"

          if [ -z "${asset_path}" ]; then
            asset_path="$(docker exec "${container_name}" sh -lc \
              "find /usr/share/nginx/html/assets -maxdepth 1 -type f ! -name '*.map' \
              | head -n 1 | sed 's#^/usr/share/nginx/html##'")"
          fi

          test -n "${asset_path}"
          curl -fsS "http://127.0.0.1:8080${asset_path}" >/dev/null

      - name: Summarize image build contract
        shell: bash
        run: |
          set -euo pipefail

          image_tag="main-${{ steps.meta.outputs.short_sha }}"
          image_ref="ghcr.io/futuroptimist/danielsmith.io:${image_tag}"

          {
            printf '%s\n' \
              "Image tag candidate:" \
              "\`${image_ref}\`" \
              "Sugarkube deploy tag candidate:" \
              "\`${image_tag}\`" \
              "Publish behavior:"

            if [ "${{ steps.meta.outputs.publish }}" = "true" ]; then
              printf \
                '`main-%s`, `main-latest`, and `sha-%s` will be published by the publish job.\n' \
                "${{ steps.meta.outputs.short_sha }}" \
                "${{ steps.meta.outputs.short_sha }}"
            else
              printf \
                '`%s` runs build and smoke-test only; no GHCR tags are published.\n' \
                "${{ github.event_name }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    if: needs.build-and-smoke.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: build-and-smoke
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout triggering commit
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Verify publish checkout matches smoke-tested commit
        shell: bash
        run: |
          set -euo pipefail

          checked_out_sha="$(git rev-parse HEAD)"
          expected_sha="${{ needs.build-and-smoke.outputs.full_sha }}"

          if [ "${checked_out_sha}" != "${expected_sha}" ]; then
            printf 'Publish checkout mismatch: expected %s, got %s\n' \
              "${expected_sha}" \
              "${checked_out_sha}" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/futuroptimist/danielsmith.io:main-${{ needs.build-and-smoke.outputs.short_sha }}
            ghcr.io/futuroptimist/danielsmith.io:main-latest
            ghcr.io/futuroptimist/danielsmith.io:sha-${{ needs.build-and-smoke.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.build-and-smoke.outputs.full_sha }}
            org.opencontainers.image.created=${{ needs.build-and-smoke.outputs.created }}

      - name: Summarize published immutable tag
        run: |
          image_tag="main-${{ needs.build-and-smoke.outputs.short_sha }}"
          image_ref="ghcr.io/futuroptimist/danielsmith.io:${image_tag}"

          printf '%s\n' \
            "Published immutable image tag:" \
            "\`${image_ref}\`" \
            "Sugarkube deploy tag:" \
            "\`${image_tag}\`" >> "$GITHUB_STEP_SUMMARY"
