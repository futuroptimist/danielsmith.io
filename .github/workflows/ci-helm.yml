name: Publish Helm chart

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate (publishing allowed only for main)
        required: false
        default: main

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      chart_version: ${{ steps.package.outputs.chart_version }}
      package_path: ${{ steps.package.outputs.package_path }}
      chart_ref: ${{ steps.chart_meta.outputs.chart_ref }}
      chart_changed: ${{ steps.chart_changes.outputs.chart_changed }}
    steps:
      - name: Checkout triggering commit
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set expected chart reference
        id: chart_meta
        shell: bash
        run: |
          set -euo pipefail
          chart_ref="oci://ghcr.io/futuroptimist/charts/danielsmith"
          echo "chart_ref=$chart_ref" >> "$GITHUB_OUTPUT"

      - name: Detect chart-relevant changes
        id: chart_changes
        shell: bash
        run: |
          set -euo pipefail
          chart_changed=false
          changed_paths=()

          if [ "${{ github.event_name }}" = "push" ]; then
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ "$before_sha" =~ ^0+$ ]]; then
              chart_changed=true
              echo "Push event has no before SHA; treating chart as changed for safety."
            else
              if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
                git fetch --no-tags --depth=1 origin "$before_sha"
              fi

              mapfile -t changed_paths < <(git diff --name-only "$before_sha" "$head_sha" -- \
                charts/danielsmith .github/workflows/ci-helm.yml)
              if [ "${#changed_paths[@]}" -gt 0 ]; then
                chart_changed=true
              fi
            fi
          fi

          echo "chart_changed=$chart_changed" >> "$GITHUB_OUTPUT"
          {
            echo "changed_paths<<EOF"
            printf '%s\n' "${changed_paths[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Chart-relevant changes detected: $chart_changed"
          if [ "${#changed_paths[@]}" -gt 0 ]; then
            printf -- '- %s\n' "${changed_paths[@]}"
          fi

      - name: Guard chart identity
        shell: bash
        run: |
          set -euo pipefail
          chart_name=$(helm show chart charts/danielsmith | sed -n "s/^name:[[:space:]]*//p" | head -n1)
          if [ "$chart_name" != "danielsmith" ]; then
            echo "Chart name must be danielsmith, got: $chart_name" >&2
            exit 1
          fi

      - name: Build chart dependencies when present
        shell: bash
        run: |
          set -euo pipefail
          if grep -q '^dependencies:' charts/danielsmith/Chart.yaml; then
            helm dependency build charts/danielsmith
          else
            echo "No chart dependencies detected; skipping helm dependency build."
          fi

      - name: Helm lint
        run: helm lint charts/danielsmith

      - name: Template smoke render (staging-like)
        run: |
          helm template danielsmith charts/danielsmith \
            --namespace danielsmith \
            --set ingress.enabled=true \
            --set ingress.host=staging.danielsmith.io \
            --set image.tag=main-deadbee

      - name: Package Helm chart
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package charts/danielsmith --destination dist

          mapfile -t packages < <(find dist -maxdepth 1 -type f -name "danielsmith-*.tgz" | sort)
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected exactly one chart package, found ${#packages[@]}" >&2
            printf "- %s\n" "${packages[@]}" >&2
            exit 1
          fi

          package_path="${packages[0]}"
          chart_version=$(helm show chart "$package_path" | sed -n "s/^version:[[:space:]]*//p" | head -n1)
          test -n "$chart_version"

          echo "package_path=$package_path" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: danielsmith-chart
          path: dist/

      - name: Enforce publish-eligible default image tag
        shell: bash
        run: |
          set -euo pipefail
          # Smoke render intentionally uses a staging-like image.tag override per
          # prompt requirements; this separate guard validates default image.tag.
          default_image_tag=$(awk '
            /^image:[[:space:]]*$/ { in_image=1; next }
            in_image && /^[^[:space:]]/ { in_image=0 }
            in_image && /^[[:space:]]+tag:[[:space:]]*/ {
              sub(/^[[:space:]]+tag:[[:space:]]*/, "")
              print
              exit
            }
          ' charts/danielsmith/values.yaml)
          test -n "$default_image_tag"
          if [ "$default_image_tag" = "main-latest" ] || \
            [[ "$default_image_tag" =~ ^main-[0-9a-f]{7,40}$ ]]; then
            echo "Default image.tag is publish-eligible: $default_image_tag"
          else
            echo "Default image.tag is not publish-eligible: $default_image_tag" >&2
            echo "Use main-latest or an immutable main-<shortsha> tag; bare main is not published." >&2
            exit 1
          fi
      - name: Summarize validated chart
        run: |
          echo "Validated chart reference:" >> "$GITHUB_STEP_SUMMARY"
          echo "`${{ steps.chart_meta.outputs.chart_ref }}`" >> "$GITHUB_STEP_SUMMARY"
          echo "Validated chart version:" >> "$GITHUB_STEP_SUMMARY"
          echo "`${{ steps.package.outputs.chart_version }}`" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart-relevant changes detected:" >> "$GITHUB_STEP_SUMMARY"
          echo "`${{ steps.chart_changes.outputs.chart_changed }}`" >> "$GITHUB_STEP_SUMMARY"

  publish-chart:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (inputs.ref == 'main' || inputs.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    needs: helm-validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download packaged chart
        uses: actions/download-artifact@v4
        with:
          name: danielsmith-chart
          path: .

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Authenticate to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish or skip OCI chart
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          chart_ref="${{ needs.helm-validate.outputs.chart_ref }}"
          chart_registry="${chart_ref%/*}"
          chart_version="${{ needs.helm-validate.outputs.chart_version }}"
          chart_changed="${{ needs.helm-validate.outputs.chart_changed }}"
          status=published
          message="Published ${chart_ref}:${chart_version}."

          if [ "${{ github.event_name }}" = "push" ] && [ "$chart_changed" != "true" ]; then
            status=skipped
            message="Skipped publication because this main push did not change chart-relevant files."
            echo "$message"
          elif helm show chart "${chart_ref}" --version "${chart_version}" >/dev/null 2>&1; then
            if [ "$chart_changed" = "true" ]; then
              status=failed
              message="Chart-relevant files changed, but ${chart_ref}:${chart_version} already exists."
              echo "$message" >&2
              echo "Bump charts/danielsmith/Chart.yaml version before publishing again." >&2
              echo "status=$status" >> "$GITHUB_OUTPUT"
              echo "message=$message" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            status=skipped
            message="Skipped publication because ${chart_ref}:${chart_version} already exists."
            echo "$message"
          else
            mapfile -t packages < <(find . -maxdepth 2 -type f -name "danielsmith-*.tgz" | sort)
            if [ "${#packages[@]}" -ne 1 ]; then
              echo "Expected exactly one downloaded chart package, found ${#packages[@]}." >&2
              printf -- "- %s\n" "${packages[@]}" >&2
              exit 1
            fi
            package_path="${packages[0]}"
            helm push "$package_path" "$chart_registry"
            echo "$message"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "message=$message" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "chart_ref=$chart_ref" >> "$GITHUB_OUTPUT"

      - name: Summarize chart publication
        if: always()
        run: |
          echo "Chart publication status:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.publish.outputs.status || 'failed' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart publication message:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.publish.outputs.message || 'Chart publication failed; review the publish step logs.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart reference:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ needs.helm-validate.outputs.chart_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart version:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ needs.helm-validate.outputs.chart_version }}\`" >> "$GITHUB_STEP_SUMMARY"
