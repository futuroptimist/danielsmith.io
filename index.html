<!doctype html>
<html lang="en" data-app-mode="loading" data-app-loading>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <title>danielsmith.io</title>
    <style>
      :root {
        color-scheme: dark;
        --hud-analytics-glow: 0;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      html {
        background: linear-gradient(180deg, #0a111c 0%, #020408 100%);
        background-color: #020408;
      }

      body {
        margin: 0;
        background: transparent;
        color: rgba(224, 236, 255, 0.9);
        min-height: 100%;
        transition: opacity 240ms ease;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 1rem);
        right: calc(env(safe-area-inset-right, 0px) + 1rem);
        z-index: 40;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.55rem;
        max-width: min(22rem, calc(100vw - 2rem));
        color: rgba(224, 236, 255, 0.9);
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .overlay__menu {
        display: flex;
        align-items: stretch;
        justify-content: flex-end;
        gap: 0.25rem;
        padding: 0.25rem;
        border: 1px solid rgba(123, 209, 255, 0.4);
        border-radius: 999px;
        background: rgba(9, 18, 28, 0.88);
        box-shadow: 0 20px 48px rgba(3, 9, 18, 0.55);
      }

      .overlay__menu-button {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        min-height: 2.45rem;
        padding: 0.55rem 0.72rem;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #e7f4ff;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      .overlay__menu-button:hover,
      .overlay__menu-button:focus-visible {
        background: rgba(196, 232, 255, 0.1);
        outline: none;
      }

      .overlay__menu-button[aria-pressed='true'] {
        background: rgba(80, 164, 255, 0.24);
      }

      .overlay__menu-key {
        min-width: 1.35rem;
        padding: 0.1rem 0.32rem;
        border-radius: 999px;
        background: rgba(196, 232, 255, 0.14);
        color: rgba(228, 244, 255, 0.92);
        font: inherit;
        font-size: 0.74rem;
        font-weight: 700;
        text-align: center;
      }

      .overlay__popover {
        width: min(22rem, calc(100vw - 2rem));
        max-height: min(
          32rem,
          calc(100vh - 7.5rem - env(safe-area-inset-top, 0px))
        );
        padding: 0.9rem 1rem;
        border: 1px solid rgba(86, 184, 255, 0.28);
        border-radius: 0.75rem;
        background: rgba(8, 12, 20, 0.78);
        box-shadow: 0 20px 48px rgba(3, 9, 18, 0.55);
        overflow: auto;
        overscroll-behavior: contain;
      }

      .overlay__popover[hidden],
      .overlay__item[hidden] {
        display: none;
      }

      :root[data-hud-layout='mobile'] .overlay {
        top: calc(env(safe-area-inset-top, 0px) + 0.75rem);
        right: calc(env(safe-area-inset-right, 0px) + 0.75rem);
        max-width: min(20rem, calc(100vw - 1.5rem));
        font-size: 0.85rem;
        line-height: 1.5;
      }

      :root[data-hud-layout='mobile'] .overlay__menu-button {
        gap: 0.25rem;
        min-height: 2.35rem;
        padding: 0.45rem 0.5rem;
        font-size: 0.78rem;
      }

      :root[data-hud-layout='mobile'] .overlay__menu-key {
        min-width: 1.1rem;
        padding-inline: 0.24rem;
      }

      :root[data-hud-layout='mobile'] .overlay__popover {
        width: min(20rem, calc(100vw - 1.5rem));
        max-height: min(
          26rem,
          calc(100vh - 7rem - env(safe-area-inset-top, 0px))
        );
      }

      .help-modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(2, 8, 15, 0.68);
        backdrop-filter: blur(18px);
        z-index: 60;
      }

      .help-modal-backdrop[hidden] {
        display: none;
      }

      .help-modal {
        width: min(32rem, 100%);
        max-height: min(38rem, 100%);
        overflow: auto;
        padding: 1.6rem 1.8rem;
        border-radius: 1.15rem;
        background:
          linear-gradient(
            160deg,
            rgba(14, 26, 41, 0.95),
            rgba(12, 32, 53, 0.88)
          ),
          rgba(7, 16, 28, 0.9);
        border: 1px solid rgba(104, 202, 255, 0.32);
        box-shadow: 0 40px 90px rgba(3, 9, 18, 0.65);
        color: #e9f6ff;
      }

      .help-modal__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .help-modal__title {
        margin: 0;
        font-size: 1.35rem;
        letter-spacing: 0.01em;
      }

      .help-modal__close {
        border: 1px solid rgba(132, 214, 255, 0.45);
        border-radius: 999px;
        padding: 0.45rem 0.9rem;
        background: rgba(10, 24, 38, 0.85);
        color: #e2f4ff;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease;
      }

      .help-modal__close:hover,
      .help-modal__close:focus-visible {
        border-color: rgba(164, 236, 255, 0.85);
        background: rgba(16, 36, 54, 0.92);
        outline: none;
      }

      .help-modal__description {
        margin: 0 0 1.25rem;
        color: rgba(221, 239, 255, 0.92);
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .help-modal__section {
        margin: 0 0 1.4rem;
      }

      .help-modal__section:last-of-type {
        margin-bottom: 0;
      }

      .help-modal__section-heading {
        margin: 0 0 0.55rem;
        font-size: 0.98rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: rgba(154, 220, 255, 0.95);
      }

      .help-modal__list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .help-modal__item {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
      }

      .help-modal__item-label {
        width: 11rem;
        font-weight: 600;
        color: rgba(144, 219, 255, 0.98);
        letter-spacing: 0.01em;
      }

      .help-modal__item-description {
        flex: 1;
        color: rgba(224, 243, 255, 0.9);
      }

      [data-app-loading] body {
        opacity: 0;
      }

      [data-app-loading] .overlay {
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
      }

      [data-app-mode='fallback'] .overlay {
        display: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      <style>
        #app {
          display: none !important;
        }

        .noscript-fallback {
          min-height: 100vh;
          min-height: 100dvh;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          padding-block-start: max(3rem, env(safe-area-inset-top));
          padding-block-end: max(3rem, env(safe-area-inset-bottom));
          padding-inline: clamp(1.5rem, 4vw, 4rem);
          gap: 1.5rem;
          background: linear-gradient(180deg, #0a111c 0%, #020408 100%);
          color: rgba(224, 236, 255, 0.9);
          font-family:
            'Inter',
            -apple-system,
            BlinkMacSystemFont,
            'Segoe UI',
            sans-serif;
        }

        .noscript-fallback__actions {
          display: flex;
          flex-wrap: wrap;
          gap: 0.75rem;
          padding: 0;
          margin: 0;
          list-style: none;
        }

        .noscript-fallback__link {
          display: inline-flex;
          align-items: center;
          padding: 0.6rem 1rem;
          border-radius: 0.65rem;
          background: rgba(16, 43, 70, 0.78);
          border: 1px solid rgba(114, 210, 255, 0.28);
          color: inherit;
          text-decoration: none;
          font-weight: 600;
          letter-spacing: 0.01em;
        }

        .noscript-fallback__link:focus,
        .noscript-fallback__link:hover {
          border-color: rgba(158, 232, 255, 0.8);
        }
      </style>
      <section class="noscript-fallback" data-mode="text" lang="en">
        <header>
          <h1>danielsmith.io — text tour</h1>
          <p>
            JavaScript is disabled or blocked, so we launched the lightweight
            text experience.
          </p>
        </header>
        <p>
          Explore recent projects, download a résumé, or re-enable JavaScript to
          load the immersive 3D home.
        </p>
        <ul class="noscript-fallback__actions">
          <li>
            <a
              class="noscript-fallback__link"
              href="/docs/resume/2025-09/resume.pdf"
            >
              View résumé
            </a>
          </li>
          <li>
            <a
              class="noscript-fallback__link"
              href="https://github.com/futuroptimist"
            >
              GitHub projects
            </a>
          </li>
          <li>
            <a class="noscript-fallback__link" href="/?mode=text">
              Static portfolio
            </a>
          </li>
        </ul>
      </section>
    </noscript>
    <div id="app"></div>
    <div class="overlay" id="control-overlay" aria-label="HUD menu">
      <div class="overlay__menu" data-role="hud-menu" aria-label="HUD menu">
        <button
          class="overlay__menu-button"
          type="button"
          data-role="controls-button"
          aria-expanded="false"
          aria-pressed="false"
        >
          <span data-hud-menu-label="controls">Controls</span>
          <kbd class="overlay__menu-key" data-hud-menu-key="controls">C</kbd>
        </button>
        <button
          class="overlay__menu-button"
          type="button"
          data-role="text-mode-button"
        >
          <span data-hud-menu-label="text">Text</span>
          <kbd class="overlay__menu-key" data-hud-menu-key="text">T</kbd>
        </button>
        <button
          class="overlay__menu-button"
          type="button"
          data-control="help"
          data-role="settings-button"
          aria-expanded="false"
          aria-pressed="false"
          data-hud-announce="Open settings and help. Press H to review controls and accessibility tips."
        >
          <span data-hud-menu-label="settings">Settings</span>
          <kbd class="overlay__menu-key" data-hud-menu-key="settings">H</kbd>
        </button>
      </div>
      <div class="overlay__popover" data-role="controls-popover" hidden>
        <div class="overlay__popover-header">
          <p class="overlay__heading" data-control-text="heading">Controls</p>
          <button
            class="overlay__popover-close"
            type="button"
            data-role="controls-close"
            aria-label="Close controls"
          >
            ×
          </button>
        </div>
        <ul class="overlay__list" data-role="control-list">
          <li
            class="overlay__item"
            data-input-methods="keyboard"
            data-control-item="keyboardMove"
          >
            <span class="overlay__keys">WASD / Arrow keys</span>
            <span class="overlay__description">Move</span>
          </li>
          <li
            class="overlay__item overlay__item--desktop"
            data-input-methods="pointer"
            data-control-item="pointerDrag"
          >
            <span class="overlay__keys">Left mouse button</span>
            <span class="overlay__description">Drag to pan</span>
          </li>
          <li
            class="overlay__item overlay__item--desktop"
            data-input-methods="pointer"
            data-control-item="pointerZoom"
          >
            <span class="overlay__keys">Scroll wheel</span>
            <span class="overlay__description">Zoom</span>
          </li>
          <li
            class="overlay__item overlay__item--touch"
            data-input-methods="touch"
            data-control-item="touchDrag"
          >
            <span class="overlay__keys">Touch</span>
            <span class="overlay__description">
              Drag the left half to move and the right half to pan
            </span>
          </li>
          <li
            class="overlay__item overlay__item--touch"
            data-input-methods="touch"
            data-control-item="touchPinch"
          >
            <span class="overlay__keys">Pinch</span>
            <span class="overlay__description">Zoom</span>
          </li>
          <li
            class="overlay__item"
            data-input-methods="keyboard"
            data-control-item="cyclePoi"
          >
            <span class="overlay__keys">Q / E</span>
            <span class="overlay__description">Cycle POIs</span>
          </li>
          <li
            class="overlay__item"
            data-input-methods="keyboard"
            data-control-item="toggleTextMode"
          >
            <span class="overlay__keys">T</span>
            <span class="overlay__description">Switch to text mode</span>
          </li>
          <li
            class="overlay__item"
            data-control="interact"
            data-role="interact"
            data-input-methods="keyboard pointer touch"
            data-control-item="interact"
            hidden
          >
            <span class="overlay__keys" data-role="interact-label">F</span>
            <span
              class="overlay__description"
              data-control="interact-description"
              data-role="interact-description"
            >
              Interact
            </span>
          </li>
        </ul>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
